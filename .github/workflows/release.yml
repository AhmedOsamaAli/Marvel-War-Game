name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build app image
        run: .\gradlew.bat jpackageImage

      - name: Zip app image
        run: |
          Compress-Archive `
            -Path "build\jpackage\dist\MarvelWarGame" `
            -DestinationPath "MarvelWarGame-Windows.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MarvelWarGame-Windows.zip
          generate_release_notes: true
          body: |
            ## Marvel War Game — Windows Release

            1. Download **MarvelWarGame-Windows.zip**
            2. Extract the folder anywhere
            3. Run **MarvelWarGame.exe**

            No Java installation required — the JRE is bundled inside.
